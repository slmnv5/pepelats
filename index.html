<html>
<head>
    <script>
        const header = document.getElementById('header');
        const content = document.getElementById('content');
        const description = document.getElementById('description');
        const url = '/update';

        fetch(url)
          .then((response) => {
            return response.json();
          })
          .then((data) => {
            let header.innerHTML = data.header;
            let content.innerHTML = data.content;
            let description.innerHTML = data.description;
            });
          }).
          .catch(function(error) {
            console.log(error);
          });
    </script>
</head>
<body>
<p id="header">header</p>
<p id="description">11111111111</p>
<p id="content">2222222222</p>

</body>
</html>
