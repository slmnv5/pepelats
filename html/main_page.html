<html>
<head>
</head>
<body>
<p id="header">hhhhhhhhhhhh</p>
<p id="description">11111111111</p>
<p id="content">2222222222</p>

<script type="text/javascript">
    const HEADER = document.getElementById('header');
    const CONTENT = document.getElementById('content');
    const DESCRIPTION = document.getElementById('description');
    const URL = 'http://192.168.1.3:8000/update';

    var getStuff = async () => {
      while(true) {
          let res = await fetch(URL);
          let data = await res.json();
          let parsed = JSON.parse(data);
          HEADER.textContent = parsed.header
          DESCRIPTION.textContent = parsed.description
          CONTENT.textContent = parsed.content
      };
    };

    getStuff();

</script>
</body>
</html>
