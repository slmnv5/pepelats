<!--suppress HtmlUnknownAttribute -->
<html>
<head>
    <meta charset='utf-8'>
</head>
<body>

<form action="save_file" method="post" enctype='multipart/form-data'>
    <p>
        <b>File name:</b>
        <input type="text" name="file_name" value="{file_name}" readonly/>
        <input type="submit" value="Save file" {disabled}/>
    </p>
    
    <div>
    <label>File content:</label>
    <textarea autocapitalize="off" name="file_data" rows="30" spellcheck="false">
    {file_data}
    </textarea>
    </div>
</form>

</body>
</html>
