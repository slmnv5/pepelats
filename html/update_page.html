<!--
        _UPDATES_PER_LOOP
        update_method
        header
        description
        content
        part_len
        max_loop_len
        idx = 0
        is_rec
        max_factor
        part_delta
        max_delta
        sleep
        pos
        max_pos
        -->

<html>
<head>
    <style>
        .red {color: red;}
        .yellow {color: yellow;}
        .green {color: yellow;}
        p {width: 100%;font-family: "Noto Sans Mono", monospace;font-size: 25px;}
    </style>
</head>
<body>

<p id="header">------------------ ------------ ------- </p>
<p id="description">description</p>
<div id="content">content</div>

<script type="text/javascript">
    "use strict";
     let win_pixels = 25
     let win_chars = 1
     recalc_width()
     window.onresize = recalc_width
     let header = ''

    const HEADER = document.getElementById('header');
    const DESCRIPTION = document.getElementById('description');
    const CONTENT = document.getElementById('content');
    const URL = '/update';

    var getStuff = async () => {
      while(true) {
          let res = await fetch(URL);
          let data = await res.json();
          DESCRIPTION.textContent = data.description

          let tmp = data.header.padStart(win_chars / 2) + data.header.padEnd(win_chars / 2)
          if (data.max_factor > 1) {
            let pos = data.max_pos * win_chars
            tmp = tmp.substring(0,pos) + '@' + tmp.substring(pos+1);
          }
          let pos = data.pos * win_chars
          tmp = "<span class='b_on_w' >" + tmp.substring(0,pos) + "<span class='w_on_b' >" + tmp.substring(pos)
          HEADER.innerHTML = tmp

          const cont_arr = data.content.split("\n");
          tmp = ''
          for (const s of cont_arr) {
                if (s[0] == '*') {
                    tmp += data.is_rec ? '<p class="red">': '<p class="green">' + s + '</p>'
                } else if (s[0] == '~') {
                    tmp += '<p class="yellow">' + s + '</p>'
                } else {
                    tmp += '<p>' + s + '</p>'
                }
            }
            CONTENT.innerHTML = tmp
          }
        };

    setTimeout(() => {
    HEADER.textContent = 'Start fetching updates from: ' + URL
    getStuff();
    }, 3000);

    function recalc_width() {
        win_pixels = document.getElementById("header_container").offsetWidth;
        win_chars = Math.floor(win_pixels / 25);
    };
</script>
</body>
</html>
