<html>
<head>
    <meta charset='utf-8'>

    <style>
        body {background-color: grey; font-weight:bolder;}
        p {width: 100%;font-size: 25px; font-family: 'Courier New',monospace,Courier}
    </style>
</head>
<body>

<p id="header" style="text-align: center;"> Welcome! </p>
<p id="progress" style="line-height: 25px;margin: 0px;"> </p>
<p id="description" style="text-align: center;">description</p>
<div id="content">content</div>

<script type="text/javascript">
    "use strict";
    const HEADER = document.getElementById('header');
    const PROGRESS = document.getElementById('progress')
    const DESCRIPTION = document.getElementById('description');
    const CONTENT = document.getElementById('content');
    const URL = '/update';
    let DATA = {"sleep_tm":0.5, "header":"Not started yet","description":"content",
    "pos":0,"delta":0,"max_loop_pos":-1,"max_loop_delta":0}
    let POS = 0 // position in the song part
    let MAX_LOOP_POS = 0 // position in the max loop of the song part
    let WIN_CHARS = 10
    recalculate_width()
    window.onresize = recalculate_width

    setTimeout(updateProgress, 1000)

    var get_stuff = async () => {
      while(true) {
          let res = await fetch(URL);
          if (!res.ok) continue;
          DATA = await res.json();
          HEADER.textContent = DATA.header
          DESCRIPTION.textContent = DATA.description
          POS = DATA.pos
          MAX_LOOP_POS = DATA.max_loop_pos
          CONTENT.innerHTML = getContentHtml(DATA.content, DATA.is_rec)
        }
    };

    function updateProgress() {
        POS = (POS + DATA.delta) % 1
        if (DATA.max_loop_delta > 0) {
            MAX_LOOP_POS = (MAX_LOOP_POS + DATA.max_loop_delta) % 1
        }
        PROGRESS.innerHTML = getStr(POS, MAX_LOOP_POS)
        
        setTimeout(updateProgress, DATA.sleep_tm * 1000)
    }

    function getStr(len1, len2) {
        const chr1 = '\u2588';
        let s = '<span style="color: blue;">' + chr1.repeat(len1) + ' '.repeat(WIN_CHARS - len1) + "<br/></span>";
        if (len2 > 0) {
            s += '<span style="color: cyan;">' + chr1.repeat(len2) + ' '.repeat(WIN_CHARS - len2) + "<br/></span>";
        } else { 
            s += s;
        }
    }

    function getContentHtml(str, is_rec) {
        const cont_arr = str.split("\n");
        let tmp = ''
        for (const s of cont_arr) {
            if (s[0] == '*') {
                tmp += (is_rec ? '<p style="color: brown;">' : '<p style="color: green;">') + s + '</p>'
            } else if (s[0] == '~') {
                tmp += '<p style="color: yellow;">' + s + '</p>'
            } else {
                tmp += '<p>' + s + '</p>'
            }
        }
        return tmp
    }

    function recalculate_width() {
        WIN_CHARS = Math.floor(window.innerWidth / (25 * 0.63));
    };

    get_stuff();

</script>
</body>
</html>
