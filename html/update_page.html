<html>
<head>
    <style>
        body {background-color: grey; font-weight: bold;}
        .redClr {color: red;}
        .ylwClr {color: yellow;}
        .grnClr {color: green;}
        p {width: 100%;font-family: "Noto Sans Mono", monospace;font-size: 25px;}
    </style>
</head>
<body>

<p id="header" style="text-align: center"> Welcome! </p>
<p id="progress1"></p>
<p id="progress2"></p>
<p id="description" style="text-align: center; color: blue">description</p>
<div id="content">content</div>

<script type="text/javascript">
    "use strict";
     let WIN_CHARS = 10
     recalculate_width()
     window.onresize = recalculate_width
    
    const HEADER = document.getElementById('header');
    const P1 = document.getElementById('progress1')
    const P2 = document.getElementById('progress2')
    const DESCRIPTION = document.getElementById('description');
    const CONTENT = document.getElementById('content');
    const URL = '/update';
    let DATA = {'sleep_tm':2, "header":"Not started yet","description":"content",
    "pos":0,"delta":0,"max_loop_pos":-1,"max_loop_delta":0}
    let POS = 0 // position in the song part
    let MAX_LOOP_POS = 0 // position in the max loop of the song part
    setTimeout(updateProgress, 1000, DATA)

    var get_stuff = async () => {
      while(true) {
          let res = await fetch(URL);
          if (!res.ok) continue;
          DATA = await res.json();
          alert(DATA)
          HEADER.textContent = DATA.header
          DESCRIPTION.textContent = DATA.description
          POS = DATA.pos
          MAX_LOOP_POS = DATA.max_loop_pos
          CONTENT.innerHTML = getContentHtml(DATA.content, DATA.is_rec)
        }
    };

    function updateProgress() {
        POS = (POS + DATA.delta) % 1
        P1.textContent = getStr(POS * WIN_CHARS)
        if (DATA.max_loop_delta > 0) {
            MAX_LOOP_POS = (MAX_LOOP_POS + DATA.max_loop_delta) % 1
            P2.textContent = getStr(MAX_LOOP_POS * WIN_CHARS)
        } else {
            P2.textContent = getStr(0)
        }
        setTimeout(updateProgress, DATA.sleep_tm * 1000)
    }

    function getStr(s_len) {
        return '#'.repeat(s_len) + ' '.repeat(WIN_CHARS - s_len)
    }
    function getContentHtml(str, is_rec) {
        const cont_arr = str.split("\n");
        let tmp = ''
        for (const s of cont_arr) {
            if (s[0] == '*') {
                tmp += (is_rec ? '<p class="redClr">' : '<p class="grnClr">') + s + '</p>'
            } else if (s[0] == '~') {
                tmp += '<p class="ylwClr">' + s + '</p>'
            } else {
                tmp += '<p>' + s + '</p>'
            }
        }
        return tmp
    }

    function recalculate_width() {
        WIN_CHARS = Math.floor(window.innerWidth / 25);
    };

    get_stuff();

</script>
</body>
</html>
