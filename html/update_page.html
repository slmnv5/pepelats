<html>
<head>
    <style>
        .red {color: red;}
        .yellow {color: yellow;}
        .green {color: green;}
        .w_on_b {color: white; background-color: black;}
        .b_on_w {color: black; background-color: white;}
        p {width: 100%;font-family: "Noto Sans Mono", monospace;font-size: 25px;}
    </style>
</head>
<body>

<p id="header">------------------ ------------ ------- </p>
<p id="description">description</p>
<div id="content">content</div>

<script type="text/javascript">
    "use strict";
     let win_pixels = 25
     let win_chars = 1
     recalculate_width()
     window.onresize = recalculate_width
     let header = ''

    const HEADER = document.getElementById('header');
    const DESCRIPTION = document.getElementById('description');
    const CONTENT = document.getElementById('content');
    const URL = '/update';

    var getStuff = async () => {
      while(true) {
          let res = await fetch(URL);
          let data = await res.json();
          console.log(data)
          update_progress(data, 0)
          // {sleep_tm, pos, max_loop_pos, delta, max_loop_delta}
          DESCRIPTION.textContent = data.description
          setInterval(update_progress,data.sleep_tm, update_progress, delta);

          const cont_arr = data.content.split("\n");
          tmp = ''
          for (const s of cont_arr) {
                if (s[0] == '*') {
                    tmp += (data.is_rec ? '<p class="red">' : '<p class="green">') + s + '</p>'
                } else if (s[0] == '~') {
                    tmp += '<p class="yellow">' + s + '</p>'
                } else {
                    tmp += '<p>' + s + '</p>'
                }
            }
            CONTENT.innerHTML = tmp
          }
        };

    setTimeout(() => {
        HEADER.textContent = 'Start fetching updates from: ' + URL
        getStuff();
    }, 3000);

    function update_progress(data) {
          let tmp = data.header.padStart(win_chars / 2) + data.header.padEnd(win_chars / 2)
          if (data.max_loop_delta > 0) {
            data.max_loop_pos += data.max_loop_delta
            let pos = data.max_loop_pos * win_chars
            tmp = tmp.substring(0,pos) + '@' + tmp.substring(pos+1);
          }
          data.pos += delta
          let pos = data.pos * win_chars
          console.log(tmp, 111111111, HEADER.innerHTML)
          tmp = "<span class='b_on_w' >" + tmp.substring(0,pos) +
          "</span><span class='w_on_b' >" + tmp.substring(pos) + "</span>"
          HEADER.innerHTML = tmp
    }


    function recalculate_width() {
        win_pixels = window.innerWidth;
        win_chars = Math.floor(win_pixels / 25);
    };
</script>
</body>
</html>
