<html>
<head>
    <style>
        .container {
          position: relative;
          height: 75px;
          width: 100%;
          display: flex;
         }

        .color1 {
          width: 33%;
          background-color: red;
        }

        .color2 {
          width: 67%;
          background-color: violet;
        }

        #header {
         width: 100%;
         position: absolute;
         text-align: center;
         color: white;
         mix-blend-mode: difference;
        }


         p {
            width: 100%;
            font-family: "Noto Sans Mono", monospace;
            font-size: 25px;
         }
    </style>

</head>
<body>

<div class="container" id="header_container">
    <div class="color1"></div>
    <div class="color2"></div>
    <p id="header">Baraban caraban</p>
</div>
<p id="description">description</p>
<p id="content">content</p>


<button id="checkButton" onclick="checkWidth()">
    Check Width
</button>

<script type="text/javascript">
    "use strict";
    let win_pixels = 10
     recalc_width()
     window.onresize = recalc_width

    const HEADER = document.getElementById('header');
    const CONTENT = document.getElementById('content');
    const DESCRIPTION = document.getElementById('description');
    const URL = '/update';

    var getStuff = async () => {
      while(true) {
          let res = await fetch(URL);
          let data = await res.json();
          HEADER.textContent = data.header
          DESCRIPTION.textContent = data.description
          CONTENT.textContent = data.content.replace(/(?:\n)/g, '<br/>');
      };
    };
    setTimeout(() => {
     HEADER.textContent = 'Start fetching updates'
     getStuff();
    }, 3000)

    function recalc_width() {
        win_pixels = document.getElementById("header_container").offsetWidth;
    }
</script>
</body>
</html>
