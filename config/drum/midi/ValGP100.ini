; part of the port name for Valeton GP-100
midi_out_name : VALETON
; VALETON GP-100 has limited set of MIDI commands

; Some other Valeton commands:
;bpm for effects : [0xB0, 71 if BPM < 127.5 else 70, round(BPM) if BPM < 127.5 else (round(BPM) - 128)]
;start of drum: [0xB0, 59, 0]
;prog change msg : [0xB0, 60, PROG]


; Another way to sync is stop/start drum at every 4th bar
; bar_msg : [] if (COUNT % 4) else [[0xB0, 59, 127], [0xB0, 59, 0]]

; Sync by switching PROG at start of a bar between PROGs 65 and 66
bar_msg : [0xB0, 60, 65 + (COUNT % 2)]

; set BPM using special CC of Valeton for drums
bpm_msg : [0xB0, 74 if BPM < 127.5 else 73, round(BPM) if BPM < 127.5 else (round(BPM) - 128)]

; Stop by volume=0, start by volume=VOLUME
stop_msg : [0xB0, 61, 0]
volume_msg : [0xB0, 61, round(VOLUME * 100)]
prog_msg : [0xB0, 61, round(VOLUME * 100)]
