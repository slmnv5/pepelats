[DEFAULT]
# 3 gui buttons on top
gui : [play] [song] [param] [next]
prev : _prev_section
next : _next_section
param : _update_menu param.ini
song : _update_menu song.ini
play : _update_menu play.ini
#commands below are for MIDI controller
12-1 : _prev_section
13-1 : _next_section
12-6 : _update_menu play.ini
13-6 : _update_menu param.ini


[save]
description : %(gui)s song: A1-[stop] B1-[stop_end] C2-[save] CH-[save_new] D2-[init] DH-[delete]
update_method : _show_name
60-100 : _stop_song 0: _update_menu play.ini
62-100 : _stop_song 1: _update_menu play.ini
64-2 : _save_song: _update_menu play.ini
64-6 : _save_new_song: _update_menu play.ini
65-2 : _init_song: _update_menu play.ini
65-6 : _delete_song: _load_song: _update_menu play.ini


stop : _stop_song 0: _update_menu play.ini
stop_end : _stop_song 1: _update_menu play.ini
save : _save_song: _update_menu play.ini
save_new : _save_new_song: _update_menu play.ini
init : _init_song: _update_menu play.ini
delete : _delete_song: _load_song: _update_menu play.ini

[load]
description : %(gui)s song: A1-[go_up] B1-[go_dn] D2-[load] DH-[delete]
update_method : _show_songs
60-100 : _iterate_song -1
62-100 : _iterate_song 1
65-2 : _load_song: _update_menu play.ini
65-6 : _delete_song

go_up : _iterate_song -1
go_dn : _iterate_song 1
load : _load_song: _update_menu play.ini
delete : _delete_song

[service]
description : %(gui)s service: A2-[update] B2-[restart] D1-[show_ports] D2-[gui_test]
update_method :
60-2 : _update_app
62-2 : _restart_looper
65-1 : _show_ports
65-2 : _gui_test

update : _update_app
restart : _restart_looper
show_ports : _show_ports
gui_test : _gui_test
