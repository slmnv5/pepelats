[default]
; this is included in all sections
E1 : menu
E6 : menu play
E7 : menu song
E8 : menu serv

F1 : _menu_drum randomize: update
F2 : _menu_drum fill: update
F3 : _menu_drum stop
F6 : _menu_stop faster

[serv.0]
description : drum A1-style A2-loop A3-midi B1-none B2-restart
show : _show_info
A1 : _menu_drum_type StyleDrum: menu play
A2 : _menu_drum_type LoopDrum: menu play
A3 : _menu_drum_type MidiDrum: menu play
B1 : _menu_drum_type Drum: menu play
B2 : exit


[serv.1]
description : drum A1-vol_dn A2-vol_up B1-par_dn B2-par_up
show : _show_drum_param
A1 : _menu_drum_volume 0.83: update
A2 : _menu_drum_volume 1.2: update
B1 : _menu_drum_param -0.2: update
B2 : _menu_drum_param 0.2: update


