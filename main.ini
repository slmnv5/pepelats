[AUDIO]
max_len_seconds = 60
# case insensitive device names to use
device_name = USB Audio
# data type to process and store audio information, int16 or float32
device_type = int16
# adjust WAV samples volume for drums: 0.1 to 1.0
drum_volume = 0.7

[KEYBOARD]
# 6 comma separated computer keyboard keys for MIDI control on linux (for live use)
kbd_notes_linux = `, 4, 8, =, page up, -
# 6 comma separated computer keyboard keys for MIDI control on windows (for test)
kbd_notes_windows = 1, 2, 3, 4, q, w
# 6 comma separated MIDI notes for each key above
midi_notes = 60, 62, 64, 65, 12, 13

[MIDI]
# input for MIDI control if typing keyboard not attached
midi_in = BlueBoard
# MIDI drum output, optional
midi_out = Ssh

[MENU]
# menu layout, button6 or button4
menu_dir = button6

