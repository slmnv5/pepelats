; Do not change this file, it is restored by update. Edit local.ini

[LOOPER]
;change_late -- if =1 change part at the end of the longest loop, otherwise at the end of the 1-st loop
change_late = 0

[SCREEN]
;screen_type -- where to show looper's info, 0-text terminal, 1-web page. For web WiFi connection is required
screen_type = 0

[AUDIO]
;max_len_seconds -- how long a loop may be.
;device_name -- name (or part of name) of the device to use, case insensitive
;device_type -- data type to process and store audio information, int16 or float32
;sample_rate -- sample rate, 48000 or 44100, depends on audio device used
;loop_clear -- if =1 old sound is deleted when recording, otherwise sound builds up
max_len_seconds = 60
device_name = USB Audio
device_type = float32
sample_rate = 44100
loop_clear = 1


[MIDI]
;midi_in  -- name (or part of name) for MIDI input control, optional
;midi_out --  name (or part of name) for MIDI drum output, optional

midi_in = BlueBoard
midi_out = Ssh


[MENU]
;menu_layout -- menu layout directory located in ./config/menu/ This directory has more INI files
menu_layout = 6-4-menu

[DRUM]
;drum_volume -- initial drum volume (from 0.0 to 1.0), use if WAV samples are too loud
;drum_param -- initial drum parameter (from 0.0 to 1.0). It works differently depending on drum type
drum_volume = 0.2
drum_param = 0.5

[DRUM_BREAK]
;style = XYZ -- pattern name with XYZ is a fill/break, if empty, break is defined by pattern's energy
;euclid -- same as above for Euclid drum type
style = Brk
euclid =
