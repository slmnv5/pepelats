[AUDIO]
max_len_seconds = 60
sd_rate = 44100
sd_type = int16
# case insensitive device names to use
preffered_list = Valeton, USB Audio, Behringer

[KEYBOARD]
# 6 comma separated computer keyboard keys for foot control on linux
kbd_notes_linux = `, 6, =, -, x, /
# 6 comma separated computer keyboard keys for hand control on windows
kbd_notes = 1, 2, 3, 4, q, w
# 6 comma separated MIDI notes for each key above
midi_notes = 60, 62, 64, 65, 12, 13

[MIDI]
midi_in = BlueBoard
midi_out = Ssh

[MENU]
menu_dir = button6

