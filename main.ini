; Do not change this file, it is restored by update. Edit user.ini instead

;min_loops -- add new loop to song part until min_loops are recorded
min_loops : 2

;max_len_seconds -- how long a loop may be.
max_len_seconds : 60

;late_delay -- if tapping late < late_delay -- switch/stop loop anyway.
late_delay : 0.1

;tap_delay -- if delay between taps < tap_delay -- is counted as multi-tap and makes new message.
tap_delay : 0.5

;samples_volume -- only for Style drum. Use it if drum samples (WAV files) volume needs adjustment
samples_volume : 0.7

;log_level -- one of: debug, info, warn, error. Default is error with minimal logging
log_level : warn

;audio_names -- names (or part of names) of audio device, case sensitive. Use comma for multiple devices
audio_names : USB Audio, Microsoft Sound Mapper

;midi_in_names  -- names (or part of names) for MIDI input control, case sensitive. Use comma for multiple devices
midi_in_names : BlueBoard, FootCtrlPlus

;keyboard_keys  -- keys on computer keyboard if using keyboard as MIDI IN
keyboard_keys : 1, 2, 3, 4, q, w
;keyboard_keys : `, 4, 8, page up, -

;keyboard_notes -- MIDI notes (or CC) sent by each button, integers from 0 to 127
keyboard_notes : 60, 62, 64, 65, 12, 13

