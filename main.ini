[COMMENT]
max_len_seconds = 60 -- how long a loop may be
device_name = USB Audio -- name (or part of name) of the device to use, case insensitive
device_type = int16 -- data type to process and store audio information, int16 or float32
drum_volume = 0.7 -- adjust all WAV samples volume
kbd_notes_linux = `, 4, 8, =, page up, -  -- 6 computer keys on linux (for live use)
kbd_notes_windows = 1, 2, 3, 4, q, w -- 6 computer keys on windows (for testing)
kbd_notes_midi = 60, 62, 64, 65, 12, 13 -- 6 notes of MIDI foot controler peldal
midi_in = BlueBoard -- input name for MIDI control, optional. If computer keyboard is found it is used
midi_out = Ssh -- name of MIDI out for MIDI drum output, optional
midi_min_velo = 10 -- min note velocity to consider, small velocities used by counted notes (e.g. 1, 2,.., 7)
menu_dir = 6x4xN -- menu layout directory located in /config/menu/ (6 nuttons x 4 parts x N (any) loops in part)

[AUDIO]
max_len_seconds = 60
device_name = USB Audio
device_type = int16
drum_volume = 0.7

[KEYBOARD]
kbd_notes_linux = `, 4, 8, =, page up, -
kbd_notes_windows = 1, 2, 3, 4, q, w
kbd_notes_midi = 60, 62, 64, 65, 12, 13

[MIDI]
midi_in = BlueBoard
midi_out = Ssh
midi_min_velo = 10

[MENU]
menu_dir = 4x2xN

