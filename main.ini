[COMMENT]
max_len_seconds = 60 -- how long a loop may be
device_name = USB Audio -- name (or part of name) of the device to use, case insensitive
device_type = int16 -- data type to process and store audio information, int16 or float32
drum_volume = 0.7 -- adjust all WAV samples volume
kbd_notes_linux = `, 4, 8, =, page up, -  -- 6 computer keys on linux keyboard if MIDI controller is missing
kbd_notes_midi = 60, 62, 64, 65, 12, 13 -- 6 notes of MIDI foot controller pedal. Velocity must be > 10
midi_in = BlueBoard -- input name for MIDI control, optional
midi_out = Ssh -- name of MIDI out for MIDI drum output, optional
menu_dir = 6x4 -- menu layout directory located in /config/menu/ (6 buttons x 4 parts)

[AUDIO]
max_len_seconds = 60
device_name = USB Audio
device_type = int16
drum_volume = 0.7


[MIDI]
kbd_notes_linux = `, 4, 8, =, page up, -
kbd_notes_midi = 60, 62, 64, 65, 12, 13
midi_in = BlueBoard
midi_out = Ssh


[MENU]
menu_dir = 4x2

